<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinguaGoWords Console & App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-red: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 16px;
            min-height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
            color: var(--text-main);
        }

        .admin-badge {
            background: var(--accent-blue);
            color: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .screen {
            display: none;
            flex-direction: column;
            gap: 14px;
            flex-grow: 1;
            justify-content: center;
        }

        .active-screen {
            display: flex;
        }

        /* User Panel */
        .main-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }

        .main-btn:hover {
            background: var(--border-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .level-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 22px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: var(--text-main);
            cursor: pointer;
            text-align: center;
        }

        .display-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 35px 20px;
            border-radius: 16px;
            text-align: center;
        }

        .word-en {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .word-uz {
            font-size: 22px;
            margin-top: 12px;
            color: var(--text-main);
            opacity: 0.9;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .option-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            color: var(--text-main);
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
        }

        /* Admin Dashboard & Stats */
        .grid-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
        }

        .stat-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-main);
        }

        .chart-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            height: 180px;
            position: relative;
        }

        .admin-area {
            width: 100%;
            height: 120px;
            background: #090d16;
            color: #22c55e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            resize: none;
        }

        /* Navigatsiya tugmalari */
        .nav-btn {
            background-color: var(--accent-blue);
            color: var(--bg-primary);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }

        .back-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .upload-label {
            background: rgba(56, 189, 248, 0.1);
            border: 1px dashed var(--accent-blue);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            display: block;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <p class="subtitle" id="flow-title">LinguaGoWords Mobile</p>
            <span class="admin-badge" id="adminToggleBtn" onclick="openAdmin()">⚙️ Analitika & Admin</span>
        </div>
        <div class="title" id="page-title">Asosiy Menyu</div>
    </div>

    <!-- 1. USER PANEL: ASOSIY MENYU -->
    <div id="screenMain" class="screen active-screen">
        <div class="main-btn" onclick="switchScreen('words')">
            <span>📚 Words (So'zlar ruyhati)</span> <span>➔</span>
        </div>
        <div class="main-btn" onclick="switchScreen('quiz')">
            <span>📝 Test (O'zini sinash)</span> <span>➔</span>
        </div>
    </div>

    <!-- 2. USER PANEL: DARAJALAR -->
    <div id="screenLevels" class="screen">
        <div class="grid-container">
            <div class="level-btn" onclick="startFeature('A1')">A1</div>
            <div class="level-btn" onclick="startFeature('A2')">A2</div>
            <div class="level-btn" onclick="startFeature('B1')">B1</div>
            <div class="level-btn" onclick="startFeature('B2')">B2</div>
            <div class="level-btn" onclick="startFeature('C1')">C1</div>
            <div class="level-btn" onclick="startFeature('C2')">C2</div>
            <div class="level-btn" style="grid-column: span 2;" onclick="startFeature('IELTS')">📘 IELTS</div>
        </div>
    </div>

    <!-- 3. USER PANEL: LUG'AT EKRENI -->
    <div id="screenWordsDisplay" class="screen">
        <div class="display-card">
            <div class="word-en" id="displayEn">-</div>
            <div class="word-uz" id="displayUz">-</div>
        </div>
        <button class="nav-btn" onclick="nextWord()">Keyingi so'z ➔</button>
    </div>

    <!-- 4. USER PANEL: QUIZ EKRENI -->
    <div id="screenQuizDisplay" class="screen">
        <div class="display-card" style="padding: 20px 10px;">
            <div class="word-en" id="quizQuestion" style="font-size: 26px;">-</div>
            <p class="subtitle" style="margin-top:6px;">To'g'ri javobni tanlang:</p>
        </div>
        <div class="quiz-options" id="quizOptionsData"></div>
    </div>

    <!-- 5. ADMIN PANEL: SMART ADVERTISING, PAYMENT ANALYTICS & SQL PARSER -->
    <div id="screenAdmin" class="screen">
        <div class="grid-stats">
            <div class="stat-card"><div class="stat-title">Foydalanuvchilar</div><div class="stat-value">12,480 ta</div></div>
            <div class="stat-card"><div class="stat-title">Konversiya (Ad)</div><div class="stat-value">4.8%</div></div>
        </div>

        <div class="chart-wrapper">
            <canvas id="miniLineChart"></canvas>
        </div>

        <div>
            <p class="subtitle" style="color: var(--accent-blue); margin-bottom: 4px;">SQL Ma'lumotlar bazasi (.sql):</p>
            <textarea id="sqlInput" class="admin-area" placeholder="INSERT INTO words VALUES ('A1', 'apple', 'olma', 'olxo\'ri', 'anor', 'behi', 'tarvuz');"></textarea>
        </div>
        
        <label class="upload-label">
            📁 SQL Fayl Yuklash (.sql)
            <input type="file" id="sqlFile" accept=".sql" style="display: none;" onchange="handleSQLFile(event)">
        </label>
        
        <button class="nav-btn" style="background-color: var(--accent-blue);" onclick="processSQL()">Bazani Yangilash (Parse)</button>
        <button class="nav-btn" style="background: var(--accent-red); color: white;" onclick="clearDatabase()">Bazani Tozalash</button>
        <p id="adminStatus" style="font-size: 12px; text-align: center; min-height: 16px; font-weight: bold;"></p>
    </div>

    <!-- GLOBAL NAVIGATSIYA PASTI -->
    <div style="margin-top: 12px;">
        <button id="backBtn" class="nav-btn back-btn" style="display: none;" onclick="goGlobalBack()">⬅ Ortga qaytish</button>
        <button id="closeBtn" class="nav-btn" style="background-color: var(--bg-secondary); color: var(--text-main); border: 1px solid var(--border-color);" onclick="tg.close()">Ilovani yopish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Admin kirish paroli (Buni xohlaganingizga o'zgartirishingiz mumkin)
        const ADMIN_PASSWORD = "vcore_admin_777";

        const defaultDatabase = {
            'A1': [{en: 'welcome', uz: 'xush kelibsiz', options: ['xush kelibsiz', 'hayr', 'ertaga']}],
            'A2': [], 'B1': [], 'B2': [], 'C1': [], 'C2': [], 'IELTS': []
        };

        let wordsDatabase = JSON.parse(localStorage.getItem('lingua_db')) || defaultDatabase;
        let currentMode = ""; 
        let activeLevel = "";
        let currentIndex = 0;
        let chartInstance = null;

        // Admin Panelga Parol orqali kirish
        function openAdmin() {
            const accessPass = prompt("Admin panelga kirish parolini kiriting:");
            if (accessPass !== ADMIN_PASSWORD) {
                alert("Xato parol! Ruxsat berilmadi.");
                return;
            }

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('screenAdmin').classList.add('active-screen');
            document.getElementById('backBtn').style.display = "block";
            document.getElementById('page-title').textContent = "Boshqaruv & Analitika";
            document.getElementById('flow-title').textContent = "Admin System";
            
            setTimeout(() => {
                const ctx = document.getElementById('miniLineChart').getContext('2d');
                if (chartInstance) { chartInstance.destroy(); }
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['Mar', 'Apr', 'May', 'Jun'],
                        datasets: [{
                            label: 'Tushum ($)',
                            data: [1700, 2400, 2800, 3240],
                            borderColor: '#38bdf8',
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            fill: true,
                            tension: 0.2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                            y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                        }
                    }
                });
            }, 50);
        }

        function handleSQLFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('sqlInput').value = e.target.result;
            };
            reader.readAsText(file);
        }

        // To'g'rilangan universal dynamic SQL Parser
        function processSQL() {
            const sqlText = document.getElementById('sqlInput').value;
            const status = document.getElementById('adminStatus');
            if(!sqlText.trim()) { alert("SQL matni kiritilmagan!"); return; }

            // Har qanday miqdordagi string elementlarni tirnoqlar ichidan ajratib oluvchi dynamic regex
            const valuesBlockRegex = /VALUES\s*\(([^)]+)\)/gi;
            
            let match;
            let counter = 0;
            let newDb = {'A1':[], 'A2':[], 'B1':[], 'B2':[], 'C1':[], 'C2':[], 'IELTS':[]};

            while ((match = valuesBlockRegex.exec(sqlText)) !== null) {
                const rawValues = match[1];
                // Vergul va tirnoqlar orqali massivga o'giramiz, har bir so'z atrofidagi tirnoqlarni tozalaymiz
                const items = rawValues.split(',').map(item => item.trim().replace(/^'|'$/g, "").replace(/\\'/g, "'"));
                
                if (items.length >= 3) {
                    const lvl = items[0].toUpperCase(); // A1, A2, IELTS...
                    const en = items[1];
                    const uz = items[2];
                    
                    // Qolgan barcha elementlar variantlar (options) hisoblanadi (3, 4 yoki undan ko'p bo'lishi mumkin)
                    let options = items.slice(3);
                    
                    // Agar SQL ichida variantlar kam kiritilgan bo'lsa, avtomatik to'g'ri javobni ham qo'shamiz
                    if (options.length === 0 || !options.includes(uz)) {
                        options.unshift(uz);
                    }

                    if (newDb[lvl]) {
                        newDb[lvl].push({ en: en, uz: uz, options: options });
                        counter++;
                    }
                }
            }

            if(counter > 0) {
                wordsDatabase = newDb;
                localStorage.setItem('lingua_db', JSON.stringify(wordsDatabase));
                status.style.color = "var(--accent-green)";
                status.textContent = `Muvaffaqiyatli! ${counter} ta so'z muammosiz yuklandi.`;
                document.getElementById('sqlInput').value = "";
            } else {
                status.style.color = "var(--accent-red)";
                status.textContent = "Xatolik! SQL sintaksisi mos kelmadi. VALUES ('A1', 'word', 'tarjima', 'opt1'...) ko'rinishida yozing.";
            }
        }

        function clearDatabase() {
            if(confirm("Haqiqatan ham barcha yuklangan ma'lumotlarni o'chirmoqchimisiz?")) {
                localStorage.removeItem('lingua_db');
                wordsDatabase = defaultDatabase;
                document.getElementById('adminStatus').style.color = "var(--text-muted)";
                document.getElementById('adminStatus').textContent = "Baza muvaffaqiyatli tozalandi!";
            }
        }

        function switchScreen(mode) {
            currentMode = mode;
            document.getElementById('screenMain').classList.remove('active-screen');
            document.getElementById('screenLevels').classList.add('active-screen');
            document.getElementById('backBtn').style.display = "block";
            document.getElementById('page-title').textContent = "Darajani tanlang";
            document.getElementById('flow-title').textContent = mode === 'words' ? "📚 Lug'at rejimi" : "📝 Test rejimi";
        }

        function startFeature(level) {
            activeLevel = level;
            currentIndex = 0;

            const list = wordsDatabase[activeLevel] || [];
            if(list.length === 0) {
                alert(`${activeLevel} darajasida so'zlar topilmadi. Avval SQL formatda ma'lumot yuklang!`);
                return;
            }

            document.getElementById('screenLevels').classList.remove('active-screen');

            if (currentMode === 'words') {
                document.getElementById('screenWordsDisplay').classList.add('active-screen');
                showWord();
            } else {
                document.getElementById('screenQuizDisplay').classList.add('active-screen');
                showQuiz();
            }
        }

        function showWord() {
            const list = wordsDatabase[activeLevel];
            document.getElementById('page-title').textContent = `${activeLevel} (${currentIndex + 1}/${list.length})`;
            document.getElementById('displayEn').textContent = list[currentIndex].en;
            document.getElementById('displayUz').textContent = list[currentIndex].uz;
        }

        function nextWord() {
            const list = wordsDatabase[activeLevel];
            currentIndex = (currentIndex + 1) % list.length;
            showWord();
        }

        function showQuiz() {
            const list = wordsDatabase[activeLevel];
            const currentQuiz = list[currentIndex];
            document.getElementById('page-title').textContent = `Quiz: ${activeLevel}`;
            document.getElementById('quizQuestion').textContent = currentQuiz.en;
            
            const optionsDiv = document.getElementById('quizOptionsData');
            optionsDiv.innerHTML = "";

            currentQuiz.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(btn, opt, currentQuiz.uz);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(button, selected, correct) {
            const options = document.getElementById('quizOptionsData').getElementsByTagName('button');
            for(let btn of options) { btn.disabled = true; }

            if (selected.toLowerCase() === correct.toLowerCase()) {
                button.style.backgroundColor = "var(--accent-green)";
                button.style.color = "var(--bg-primary)";
            } else {
                button.style.backgroundColor = "var(--accent-red)";
                for(let btn of options) {
                    if(btn.textContent.toLowerCase() === correct.toLowerCase()) {
                        btn.style.backgroundColor = "var(--accent-green)";
                        btn.style.color = "var(--bg-primary)";
                    }
                }
            }

            setTimeout(() => {
                const list = wordsDatabase[activeLevel];
                currentIndex = (currentIndex + 1) % list.length;
                showQuiz();
            }, 1200);
        }

        function goGlobalBack() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('screenMain').classList.add('active-screen');
            document.getElementById('backBtn').style.display = "none";
            document.getElementById('page-title').textContent = "Asosiy Menyu";
            document.getElementById('flow-title').textContent = "LinguaGoWords Mobile";
            document.getElementById('adminStatus').textContent = "";
        }
    </script>
</body>
</html>
