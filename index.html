<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinguaGoWords - Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #17212b;
            --tg-theme-text-color: #f5f5f5;
            --tg-theme-button-color: #2f6ea5;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #708499;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 95vh;
            user-select: none;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .title { font-size: 22px; font-weight: 700; margin: 5px 0; }
        .subtitle { font-size: 13px; color: var(--tg-theme-hint-color); margin: 0; }

        /* Asosiy menyu bosh sahifasi */
        .main-menu { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; justify-content: center; }
        .main-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            color: var(--tg-theme-text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Darajalar paneli (Grid) */
        .grid-container { display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .level-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 22px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: var(--tg-theme-text-color);
            cursor: pointer;
            text-align: center;
        }

        /* Test turlari paneli */
        .test-type-container { display: none; flex-direction: column; gap: 10px; }
        .type-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--tg-theme-text-color);
            cursor: pointer;
            text-align: left;
        }

        .action-btn:active, .level-btn:active, .type-btn:active, .main-btn:active {
            background: rgba(255, 255, 255, 0.12);
        }

        .nav-btn {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none; padding: 14px; border-radius: 12px;
            font-size: 15px; font-weight: 600; width: 100%; cursor: pointer;
            margin-top: 10px;
        }
        .back-btn { background-color: transparent; color: var(--tg-theme-hint-color); border: 1px solid var(--tg-theme-hint-color); display: none; }
    </style>
</head>
<body>

    <div class="header">
        <p class="subtitle" id="flow-title">LinguaGoWords Dashboard</p>
        <div class="title" id="page-title">Asosiy Menyu</div>
    </div>

    <!-- 1-BOSQICH: ASOSIY DEYSHBORD -->
    <div id="mainMenu" class="main-menu">
        <div class="main-btn" onclick="openWordsFlow()">
            <span>📚 Words (So'zlar)</span>
            <span>➔</span>
        </div>
        <div class="main-btn" onclick="openTestFlow()">
            <span>📝 Test (O'zini sinash)</span>
            <span>➔</span>
        </div>
    </div>

    <!-- 2-BOSQICH: DARAJALARNI TANLASH (WORDS VA TEST UCHUN UMUMIY) -->
    <div id="levelsGrid" class="grid-container">
        <div class="level-btn" onclick="selectLevel('A1')">A1</div>
        <div class="level-btn" onclick="selectLevel('A2')">A2</div>
        <div class="level-btn" onclick="selectLevel('B1')">B1</div>
        <div class="level-btn" onclick="selectLevel('B2')">B2</div>
        <div class="level-btn" onclick="selectLevel('C1') font-size:16px;">C1</div>
        <div class="level-btn" onclick="selectLevel('C2') font-size:16px;">C2</div>
        <div class="level-btn" style="grid-column: span 2;" onclick="selectLevel('IELTS')">📘 IELTS Section</div>
    </div>

    <!-- 3-BOSQICH: TEST TURINI TANLASH -->
    <div id="testTypes" class="test-type-container">
        <div class="type-btn" onclick="finalizeTest('Uzbek translation (3 options)')">🇺🇿 Uzbek translation (3 options)</div>
        <div class="type-btn" onclick="finalizeTest('Write in English')">✍️ Write in English</div>
        <div class="type-btn" onclick="finalizeTest('Fill in the blank')">📝 Fill in the blank</div>
    </div>

    <!-- NAVIGATSIYA TUGMALARI -->
    <div>
        <button id="backBtn" class="nav-btn back-btn" onclick="goBack()">⬅ Ortga qaytish</button>
        <button id="closeBtn" class="nav-btn" onclick="tg.close()">Yopish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Telegram rang sozlamalari
        if (tg.backgroundColor) {
            document.documentElement.style.setProperty('--tg-theme-bg-color', tg.backgroundColor);
            document.documentElement.style.setProperty('--tg-theme-text-color', tg.textColor);
            document.documentElement.style.setProperty('--tg-theme-button-color', tg.buttonColor);
            document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.buttonTextColor);
            document.documentElement.style.setProperty('--tg-theme-hint-color', tg.hintColor);
        }

        let currentFlow = ""; // "words" yoki "test"
        let selectedLevel = ""; 

        const pageTitle = document.getElementById('page-title');
        const flowTitle = document.getElementById('flow-title');
        const mainMenu = document.getElementById('mainMenu');
        const levelsGrid = document.getElementById('levelsGrid');
        const testTypes = document.getElementById('testTypes');
        const backBtn = document.getElementById('backBtn');

        function openWordsFlow() {
            currentFlow = "words";
            mainMenu.style.display = "none";
            levelsGrid.style.display = "grid";
            backBtn.style.display = "block";
            flowTitle.textContent = "📚 Words bo'limi";
            pageTitle.textContent = "Darajani tanlang:";
        }

        function openTestFlow() {
            currentFlow = "test";
            mainMenu.style.display = "none";
            levelsGrid.style.display = "grid";
            backBtn.style.display = "block";
            flowTitle.textContent = "📝 Test bo'limi";
            pageTitle.textContent = "Test darajasini tanlang:";
        }

        function selectLevel(level) {
            selectedLevel = level;
            if (currentFlow === "words") {
                // Skrinshot 33 dagi kabi to'g'ridan-to'g'ri botga darajani yuboradi
                tg.sendData(level);
                tg.close();
            } else if (currentFlow === "test") {
                // Test turi bosqichiga o'tish (Skrinshot 37 dagi kabi)
                levelsGrid.style.display = "none";
                testTypes.style.display = "flex";
                pageTitle.textContent = "Test turini tanlang:";
            }
        }

        function finalizeTest(type) {
            // Skrinshot 37 dagi text formatiga moslab botga signal uzatish
            tg.sendData(`Test — Level: ${selectedLevel} — ${type}`);
            tg.close();
        }

        function goBack() {
            if (testTypes.style.display === "flex") {
                testTypes.style.display = "none";
                levelsGrid.style.display = "grid";
                pageTitle.textContent = "Test darajasini tanlang:";
            } else {
                levelsGrid.style.display = "none";
                mainMenu.style.display = "flex";
                backBtn.style.display = "none";
                flowTitle.textContent = "LinguaGoWords Dashboard";
                pageTitle.textContent = "Asosiy Menyu";
            }
        }
    </script>
</body>
</html>
